name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: worker

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest --cov=src --cov-report=term-missing

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Bandit (static security analysis)
        run: bandit -c pyproject.toml -r src

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt

  docker-build:
    name: Docker image builds
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Build worker image
        run: docker build -f docker/worker/Dockerfile -t sftp-event-worker-worker:ci .

      - name: Build sftp image
        run: docker build -t sftp-event-worker-sftp:ci docker/sftp

      - name: Build rabbitmq image
        run: docker build -t sftp-event-worker-rabbitmq:ci docker/rabbitmq

      - name: Build fake-gcs image
        run: docker build -t sftp-event-worker-fake-gcs:ci docker/fake-gcs

  e2e-smoke:
    name: End-to-end smoke test
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: docker compose -f infra/docker-compose.yml up --build -d

      - name: Wait for the stack to become healthy
        run: ./scripts/healthcheck.sh

      - name: Drop a test order file and verify it lands in S3 + GCS
        run: ./scripts/drop-test-file.sh

      - name: Show logs
        if: always()
        run: docker compose -f infra/docker-compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
